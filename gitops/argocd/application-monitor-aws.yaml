apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sri-monitor-aws-eks
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    cloud: aws-eks
    component: observability
spec:
  project: sri-facturacion
  # Multi-source: chart Helm + valores versionados en el repo (path monitoring/)
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 61.3.0
      helm:
        valueFiles:
          - $values/gitops/monitoring/values.yaml
    - repoURL: https://github.com/dacl010811/gitops-multicloud.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
