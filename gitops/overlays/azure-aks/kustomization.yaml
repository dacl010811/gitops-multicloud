apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: sri-facturacion-azure-aks

namespace: sri-facturacion

resources:
  - ../../bases
  - ingress.yaml
  - secrets-store-csi.yaml

# Sobrescribe el ConfigMap base con los valores específicos de Azure AKS
patches:
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: sri-facturacion-config
  # Monta los secretos de Azure Key Vault vía CSI Driver
  - path: deployment-secrets-patch.yaml
    target:
      kind: Deployment
      name: sri-facturacion-service

# Imagen desde Azure Container Registry (ACR)
images:
  - name: sri-facturacion-service
    newName: <ACR_NAME>.azurecr.io/sri-facturacion-service
    newTag: "1.0.0"

commonLabels:
  cloud: azure-aks
