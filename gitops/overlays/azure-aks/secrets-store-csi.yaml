apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sri-facturacion-azure-secrets
  labels:
    app: sri-facturacion-service
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Identidad administrada asignada al node pool de AKS
    userAssignedIdentityID: "<MANAGED_IDENTITY_CLIENT_ID>"
    keyvaultName: "sri-keyvault"
    tenantId: "<AZURE_TENANT_ID>"
    # Secretos almacenados en Azure Key Vault (integrados con Vault)
    objects: |
      array:
        - |
          objectName: db-username
          objectType: secret
          objectAlias: DB_USER
        - |
          objectName: db-password
          objectType: secret
          objectAlias: DB_PASSWORD
        - |
          objectName: db-host
          objectType: secret
          objectAlias: DB_HOST
  # Sincroniza los secretos montados a un Secret nativo de Kubernetes
  secretObjects:
    - secretName: sri-facturacion-db
      type: Opaque
      data:
        - objectName: DB_USER
          key: DB_USER
        - objectName: DB_PASSWORD
          key: DB_PASSWORD
        - objectName: DB_HOST
          key: DB_HOST
