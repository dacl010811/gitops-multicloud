apiVersion: apps/v1
kind: Deployment
metadata:
  name: sri-facturacion-service
spec:
  template:
    spec:
      containers:
        - name: sri-facturacion-service
          # envFrom se reemplaza por completo: incluye ConfigMap base + Secret sincronizado
          envFrom:
            - configMapRef:
                name: sri-facturacion-config
            - secretRef:
                name: sri-facturacion-db
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.x-k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: sri-facturacion-azure-secrets
