apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sri-facturacion-aws-secrets
  labels:
    app: sri-facturacion-service
spec:
  provider: aws
  parameters:
    # Credenciales almacenadas en AWS Secrets Manager (integradas con Vault)
    objects: |
      - objectName: "sri/db-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: username
            objectAlias: DB_USER
          - path: password
            objectAlias: DB_PASSWORD
          - path: host
            objectAlias: DB_HOST
  # Sincroniza los secretos montados a un Secret nativo de Kubernetes
  secretObjects:
    - secretName: sri-facturacion-db
      type: Opaque
      data:
        - objectName: DB_USER
          key: DB_USER
        - objectName: DB_PASSWORD
          key: DB_PASSWORD
        - objectName: DB_HOST
          key: DB_HOST
