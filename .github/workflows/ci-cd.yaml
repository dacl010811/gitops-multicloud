name: CI/CD - SRI Facturación Service

# Objetivo: pipeline completo en <15 min (test -> build/push multi-cloud -> bump de tag GitOps)
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci-cd.yaml"
  workflow_dispatch:

# Cancela ejecuciones anteriores del mismo ref para ahorrar tiempo
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: sri-facturacion-service
  # Tag inmutable basado en el commit (trazabilidad GitOps)
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: write      # necesario para el commit de bump de tag
  id-token: write      # OIDC hacia AWS y Azure (sin credenciales de larga vida)

jobs:
  # ==========================================================
  # 1. Test unitario del microservicio FastAPI
  # ==========================================================
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run tests
        run: pytest -v --cov=. --cov-report=term-missing

  # ==========================================================
  # 2. Build de la imagen y push a ECR (AWS) y ACR (Azure)
  # ==========================================================
  build-and-push:
    name: Build & Push (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------- AWS ECR ----------
      - name: Configure AWS credentials (OIDC)
        if: matrix.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: matrix.cloud == 'aws'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push to ECR
        if: matrix.cloud == 'aws'
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- Azure ACR ----------
      - name: Login to Azure (OIDC)
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        if: matrix.cloud == 'azure'
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & push to ACR
        if: matrix.cloud == 'azure'
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================
  # 3. Bump del tag de imagen en los overlays (GitOps)
  #    ArgoCD detecta el commit y sincroniza automáticamente
  # ==========================================================
  update-manifests:
    name: Update GitOps image tags
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Kustomize
        run: |
          curl -sfLo kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz && sudo mv kustomize /usr/local/bin/

      - name: Bump image tag in overlays
        run: |
          (cd gitops/overlays/aws-eks && kustomize edit set image ${{ env.IMAGE_NAME }}=*:${{ env.IMAGE_TAG }})
          (cd gitops/overlays/azure-aks && kustomize edit set image ${{ env.IMAGE_NAME }}=*:${{ env.IMAGE_TAG }})

      - name: Commit & push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/overlays/*/kustomization.yaml
          if git diff --cached --quiet; then
            echo "Sin cambios en manifiestos"
          else
            git commit -m "ci: bump image tag to ${IMAGE_TAG} [skip ci]"
            git push
          fi
